name: Bug Report
description: Report a reproducible bug to help Argus improve.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: Argus Version
      description: What version of Argus are you running? (e.g., v1.0.0 or commit hash)
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a log sample or steps to reproduce the issue.
      placeholder: |
        1. Run Argus with the following log line...
        2. Observer that it fails to detect...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: checkboxes
    id: context
    attributes:
      label: Environment Context
      options:
        - label: Running on Linux/Server
        - label: Running on Termux (Android)
        - label: Using as a library
