log_source:
  path: "/var/log/nginx/access.log"
  custom_log_regex: "" # Regex must contain groups: 1=IP, 2=Time, 3=Method, 4=Path, 5=Status, 6=UA (optional)

engine:
  behavioral:
    error_threshold: 5
    window_seconds: 60
  scoring:
    threshold: 10
    window_seconds: 60
    weight_sqli: 5
    weight_brute: 2
    weight_path_trav: 4
    score_file: "scores.json"
    whitelist:
      - "127.0.0.1"
      - "::1"

action:
  ban_file: "banned_ips.txt"
  ttl_level_1: 60      # minutes
  ttl_level_2: 1440    # minutes (24h)
  use_iptables: true   # fallback to nftables if false
  dry_run: false
